<div class="page-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Settings</h1>
            <p class="page-subtitle">Configure system-wide settings and caching</p>
        </div>
    </div>

    <div class="content-container p-4 surface-card border-round shadow-1">
        <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()" class="flex flex-col gap-5 w-full max-w-lg">
            <div class="flex flex-col gap-2">
                <label for="cacheDuration" class="font-bold text-surface-900 dark:text-surface-0">Cache Duration
                    (Seconds)</label>
                <p class="text-sm text-surface-500 m-0">
                    The amount of time a redirect URL will be served directly from memory before expiring. Set to 0 to
                    disable caching entirely.
                </p>

                <div class="w-full">
                    <input pInputText id="cacheDuration" type="number" formControlName="cacheDuration"
                        placeholder="e.g. 600" class="w-full"
                        [ngClass]="{'ng-invalid ng-dirty': settingsForm.get('cacheDuration')?.invalid && settingsForm.get('cacheDuration')?.touched}" />
                </div>

                <small
                    *ngIf="settingsForm.get('cacheDuration')?.errors?.['required'] && settingsForm.get('cacheDuration')?.touched"
                    class="p-error">
                    Cache duration is required.
                </small>
                <small
                    *ngIf="settingsForm.get('cacheDuration')?.errors?.['min'] && settingsForm.get('cacheDuration')?.touched"
                    class="p-error">
                    Cache duration cannot be negative.
                </small>
                <small
                    *ngIf="settingsForm.get('cacheDuration')?.errors?.['max'] && settingsForm.get('cacheDuration')?.touched"
                    class="p-error">
                    Cache duration cannot exceed 86400 seconds (24 hours).
                </small>
            </div>

            <div *ngIf="errorMessage" class="mb-3">
                <p-message severity="error" [text]="errorMessage" styleClass="w-full"></p-message>
            </div>

            <div *ngIf="successMessage" class="mb-3">
                <p-message severity="success" [text]="successMessage" styleClass="w-full"></p-message>
            </div>

            <div class="mt-2">
                <p-button label="Save Settings" icon="pi pi-check" type="submit" [loading]="saving || loading"
                    [disabled]="settingsForm.invalid" styleClass="w-full sm:w-auto">
                </p-button>
            </div>
        </form>
    </div>
</div>
